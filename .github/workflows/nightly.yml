name: Nightly Dashboard Update

on:
  schedule:
    - cron: "0 6 * * *"   # 6am UTC every night (10pm PT / 11pm PDT)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Install sops
        run: |
          curl -Lo /usr/local/bin/sops \
            https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.amd64
          chmod +x /usr/local/bin/sops

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v4
        with:
          environment-file: environment.yaml
          activate-environment: cloudbank-pilot-hub-users
          auto-activate: false

      - name: Run data pipeline
        id: pipeline
        shell: bash -el {0}
        run: |
          set -o pipefail
          python main.py 2>&1 | tee pipeline_output.txt

      # Always rebuild + commit, even if a few hubs failed (e.g. 403s).
      # The pipeline still writes users.csv / otter_standalone_use.csv with
      # the data it could fetch, so the dashboard should not freeze just
      # because one or two hub tokens expired. The job still goes red and
      # Slack still fires below, so the failures stay visible.
      - name: Build dashboard
        if: always()
        shell: bash -el {0}
        run: python scripts/build_dashboard.py

      - name: Commit and push updates
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add users.csv otter_standalone_use.csv docs/
          git diff --cached --quiet || git commit -m "chore: nightly dashboard update $(date -u +%Y-%m-%d)"
          git push

      - name: Notify Slack on failure
        if: failure()
        run: |
          SUMMARY=$(grep '^Finished' pipeline_output.txt 2>/dev/null | tail -1)
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          TEXT=$(printf ':x: *Nightly Dashboard Update failed*\n```\n%s\n```\n<%s|Full run>' "$SUMMARY" "$RUN_URL")
          curl -X POST -H 'Content-type: application/json' \
            --data "$(jq -n --arg text "$TEXT" '{text: $text}')" \
            "${{ secrets.CLOUDBANK_SLACK_WEBHOOK_URL }}"
